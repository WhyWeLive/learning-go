name: Task
description: Учебный срез (Теория + Практика + AC). Без пошаговых рецептов.
title: "[Task] "
labels: ["task", "status:ready", "size:S"]
body:
  - type: markdown
    attributes:
      value: |
        Тон: строгий TL. Бить в теорию и практику. Не tutorial.
        Правила: `agents/pm.md`. Поставка: обычно часть epic-PR (`agents/git-workflow.md`).
  - type: input
    id: epic
    attributes:
      label: Epic
      description: Номер parent epic, например #1
      placeholder: "#1"
    validations:
      required: true
  - type: dropdown
    id: track
    attributes:
      label: Track
      options:
        - track:lang
        - track:db
        - track:api
        - track:auth
        - track:cache
        - track:queue
        - track:docker
        - track:observability
        - track:highload
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - size:S
        - size:M
        - size:L
      default: 0
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Зачем в продукте
      description: Зачем marketplace/сервису, не «сделай упражнение»
    validations:
      required: true
  - type: textarea
    id: theory
    attributes:
      label: Теория
      description: Определения, границы, misconceptions, контрольные вопросы
      value: |
        ### Определения и границы
        -

        ### Misconceptions
        1.

        ### Контрольные вопросы
        1.

        ### Источники (официальные + зачем)
        -
    validations:
      required: true
  - type: textarea
    id: practice
    attributes:
      label: Практика
      description: Артефакт/поведение и ограничения. Без пошагового рецепта реализации.
      value: |
        ### Артефакт / поведение
        -

        ### Запрещено в скоупе
        -

        ### Доказательство для review
        -
    validations:
      required: true
  - type: textarea
    id: nest
    attributes:
      label: Мост NestJS → Go
    validations:
      required: false
  - type: textarea
    id: ac
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
        - [ ] Контрольные вопросы закрыты в PR без misconception’ов
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Риски
      description: Минимум 2–3 риска / альтернативные гипотезы
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Связи
      value: |
        - Parent epic:
        - Depends on:
        - Blocks:
        - Related:
    validations:
      required: true
